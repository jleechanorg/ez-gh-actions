# E2E self-test: runs on an ezgha-managed ephemeral runner.
# Dispatch-only on purpose — never triggered by fork PRs (self-hosted safety).
name: ezgha-selftest
run-name: ezgha-selftest ${{ inputs.nonce || github.run_id }}
on:
  workflow_dispatch:
    inputs:
      nonce:
        description: "Unique dispatch nonce for ezgha canary correlation"
        required: false
        type: string
      runs_on_json:
        description: "JSON array of runner labels for this host's canary"
        required: false
        default: '["self-hosted","ezgha"]'
        type: string

permissions:
  contents: read

jobs:
  selftest:
    runs-on: ${{ fromJSON(inputs.runs_on_json) }}
    timeout-minutes: 10
    steps:
      - name: Prove execution environment
        run: |
          echo "canary nonce: ${{ inputs.nonce }}"
          echo "runner name: $RUNNER_NAME"
          echo "hostname: $(hostname)"
          uname -a
          nproc
          cat /sys/fs/cgroup/memory.max 2>/dev/null || cat /sys/fs/cgroup/memory/memory.limit_in_bytes 2>/dev/null || echo "no cgroup file"
          cat /sys/fs/cgroup/pids.max 2>/dev/null || true
          echo "ephemeral runner proof: this job ran, the runner will now deregister"
