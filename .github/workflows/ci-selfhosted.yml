# Runs the test suite on an ezgha-managed ephemeral runner so the self-hosted
# fleet does real work on every push. PR metadata is read from the trusted base
# workflow, and fork heads are skipped before a self-hosted runner is allocated.
name: CI (self-hosted ezgha)
on:
  push:
    branches: [main]
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ci-selfhosted
  cancel-in-progress: false

jobs:
  test-on-ezgha:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, ezgha]
    timeout-minutes: 20
    steps:
      - name: Checkout trusted base validator
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false
      - name: Validate squash-merge provenance prefix
        if: github.event_name == 'pull_request_target'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          commit_msg_file="$RUNNER_TEMP/pr-title-commit-message"
          printf '%s\n' "$PR_TITLE" > "$commit_msg_file"
          bash .githooks/commit-msg "$commit_msg_file"
      - name: Prove execution environment
        run: |
          echo "runner: $RUNNER_NAME on $(hostname)"
          echo "memory.max: $(cat /sys/fs/cgroup/memory.max 2>/dev/null || echo n/a)"
          echo "pids.max: $(cat /sys/fs/cgroup/pids.max 2>/dev/null || echo n/a)"
          echo "Verify operating system and CPU context:"
          uname -a
          nproc
          echo "Self-hosted runner execution verified successfully!"
