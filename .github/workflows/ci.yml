name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Build
        run: cargo build --all-targets
      - name: Test
        run: cargo test
      - name: Runner dashboard contract tests
        run: |
          python3 -m unittest tests/runner_dashboard_snapshot_test.py
          node --test tests/runner_dashboard_ui_test.mjs
          bash tests/runner_dashboard_host_probe_test.sh
          bash tests/runner_dashboard_publisher_test.sh
          bash tests/runner_dashboard_launchd_install_test.sh
          bash tests/watchdog_reboot_stale_state_test.sh
          bash tests/install_watchdog_gate_test.sh
          bash tests/install_uninstall_aux_units_test.sh
      - name: Mac trim guard shell regressions
        run: |
          bash tests/colima_trim_guard_test.sh
          bash tests/install_colima_trim_agent_test.sh
      - name: Cleanup-stuck-runs regression tests
        run: |
          bash tests/cleanup_stuck_runs_force_cancel_test.sh
          bash tests/cleanup_stuck_runs_multirepo_test.sh
          bash tests/cleanup_stuck_runs_race_skip_test.sh
          bash tests/cleanup_stuck_runs_verify_inconclusive_test.sh
      - name: Doctor-runner regression tests
        run: |
          bash tests/doctor_runner_expected_containers_test.sh
          bash tests/doctor_runner_heartbeat_starvation_test.sh
          bash tests/doctor_runner_host_pressure_test.sh
          bash tests/doctor_runner_live_slot_gate_test.sh
          bash tests/doctor_runner_respawn_fetch_failure_test.sh
          bash tests/doctor_runner_respawn_journal_test.sh
      - name: Install ripgrep for integrate.sh PR-payload regression test
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Host-ops, GitHub App token, and PR-payload regression tests
        run: |
          bash tests/host_ops_0725_test.sh
          bash tests/integrate_pr_payload_regression_test.sh
          bash tests/launchd_docker_host_consumers_test.sh
          bash tests/refresh_gh_app_token_timeout_test.sh
          bash tests/verify_other_error_report.sh
      - name: Install Python test-only dependencies
        run: pip install -r tests/requirements.txt
      - name: Mint-token and job-outcome-monitor Python regression tests
        run: |
          python3 -m unittest tests/verify_mint_no_retry_on_4xx.py
          python3 -m unittest tests/verify_mint_retry.py
          python3 -m unittest tests/job_outcome_monitor_test.py
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Format
        run: cargo fmt --check
