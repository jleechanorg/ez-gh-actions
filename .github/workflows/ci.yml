name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - name: Build
        run: cargo build --all-targets
      - name: Test
        run: cargo test
      - name: Mac trim guard shell regressions
        run: |
          bash tests/colima_trim_guard_test.sh
          bash tests/install_colima_trim_agent_test.sh
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Format
        run: cargo fmt --check
