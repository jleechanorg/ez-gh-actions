# /etc/watchdog.conf configuration for ez-gh-actions daemon hosts
# 
# Safety margin rationale:
# This host has 32 threads. Under a cold-start mass respawn of 16 runners,
# the 1-minute load average can briefly spike up to ~71.
# Under the old watchdog limit of max-load-1=24, the host would reboot itself,
# causing a self-inflicted outage loop.
#
# Best practice for watchdog(8) load thresholds is per-core limits:
# - Loose limit: ~10x/core 1-min load average. On 32 threads, 10 * 32 = 320.
# - Tight limit: ~5-7x/core 15-min load average.
#
# We configure a conservative but safe set of thresholds:
# - max-load-1 = 96  (Safe margin above the ~71 peak observed during mass respawn)
# - max-load-5 = 72
# - max-load-15 = 48
#
# Soft repair option:
# - repair-binary = /home/jleechan/.local/bin/watchdog-load-repair.sh
# - repair-timeout = 60
#
# Reboot loop protection:
# The watchdog daemon will attempt to run the soft repair script before
# executing a hard reboot, preventing reboot loops during transient spikes.

max-load-1 = 96
max-load-5 = 72
max-load-15 = 48

# watchdog-device = /dev/watchdog
# interval = 1
# realtime = yes
# priority = 1

repair-binary = /home/jleechan/.local/bin/watchdog-load-repair.sh
repair-timeout = 60
